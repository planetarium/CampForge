name: Release skill packages

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --ignore-scripts
      - run: bash scripts/release-pack.sh

      - name: Create GitHub Release with tarballs
        run: gh release create ${{ github.ref_name }} dist/tarballs/*.tgz --generate-notes --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
