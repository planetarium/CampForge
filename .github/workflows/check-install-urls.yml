name: Check install.sh URLs

on:
  schedule:
    - cron: '0 7 * * *'   # daily 07:00 UTC
  push:
    branches: [main]
    paths:
      - 'camps/*/install.sh'
      - 'scripts/check-install-urls.sh'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-install-urls.sh
