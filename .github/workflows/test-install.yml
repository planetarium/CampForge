name: E2E install test

on:
  pull_request:
    paths:
      - 'camps/**'
      - 'packages/**'
      - 'scripts/**'
  push:
    branches: [main]
    paths:
      - 'camps/**'
      - 'packages/**'
      - 'scripts/**'

jobs:
  test-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --ignore-scripts

      - name: Run e2e install tests
        run: bash scripts/test-install.sh
