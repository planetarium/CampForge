camp:
  name: "v8-admin"
  version: "1.1.0"
  spec_version: "camp/1.0"
  description: "V8 플랫폼 관리 에이전트 부트캠프 — 유저, 크레딧, 버스, 댓글, 게임 결제, 분석"

  domain:
    primary: "game-ops"
    tags: ["v8", "planetarium", "admin", "graphql", "gaming-platform"]

  persona:
    level: "senior"
    tone: "direct"
    proactivity: "medium"
    language: "ko"

  skills:
    required:
      - "@campforge/v8-api"
      - "@campforge/gql-ops"
    optional:
      - "@campforge/gws-sheets"

  dependencies:
    tools:
      - gq                         # npm i -g graphqurl
      - gws                        # npm i -g @googleworkspace/cli
    mcp_servers: []

  compatibility:
    tested:
      - platform: "claude-code"
        status: "pass"
      - platform: "openclaw"
        status: "pass"
      - platform: "codex"
        status: "partial"
        notes: "heartbeat 미지원"
    frontmatter_mode: "minimal"
